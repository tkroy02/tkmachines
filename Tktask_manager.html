<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK Task Manager</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/Tklesson1-32x32.png">
    <meta name="theme-color" content="#0b3d91">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #0b3d91;
            --primary-light: #1e5bbf;
            --primary-dark: #082b6f;
            --secondary: #ffd700;
            --secondary-light: #ffe066;
            --text-dark: #0b1e3d;
            --text-light: #ffffff;
            --text-gray: #4a5568;
            --text-muted: #708090;
            --background: #ffffff;
            --background-light: #f7f9fc;
            --background-alt: #eef3fb;
            --border-radius: 16px;
            --border-radius-sm: 10px;
            --shadow-sm: 0 2px 8px rgba(11, 61, 145, 0.06);
            --shadow: 0 4px 20px rgba(11, 61, 145, 0.08);
            --shadow-lg: 0 12px 40px rgba(11, 61, 145, 0.12);
            --shadow-glow: 0 0 30px rgba(255, 215, 0, 0.3);
            --transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            color: var(--text-gray);
            background-color: var(--background-light);
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--primary);
            font-weight: 800;
            line-height: 1.25;
            letter-spacing: -0.02em;
        }

        h1 { font-size: clamp(2.2rem, 5vw, 3.4rem); }
        h2 { font-size: clamp(1.8rem, 3.5vw, 2.4rem); text-align: center; margin-bottom: 1rem; }
        h3 { font-size: 1.25rem; }

        .section-badge {
            display: inline-block;
            background: var(--background-alt);
            color: var(--primary);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 6px 16px;
            border-radius: 50px;
            margin-bottom: 12px;
        }

        .section-title { text-align: center; margin-bottom: 0.75rem; }

        .section-subtitle {
            text-align: center;
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 3.5rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            transition: var(--transition);
            cursor: pointer;
            border: none;
            outline: none;
            gap: 10px;
            letter-spacing: -0.01em;
        }

        .btn-primary {
            background-color: var(--primary);
            color: var(--text-light);
            box-shadow: 0 4px 16px rgba(11, 61, 145, 0.3);
        }
        .btn-primary:hover {
            background-color: var(--primary-light);
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(11, 61, 145, 0.4);
        }

        .btn-danger {
            background-color: #ef476f;
            color: var(--text-light);
            box-shadow: 0 4px 16px rgba(239, 71, 111, 0.3);
        }
        .btn-danger:hover {
            background-color: #dc2626;
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(239, 71, 111, 0.4);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* HERO */
        .hero {
            background: linear-gradient(160deg, #03152e 0%, #082250 30%, #0b3d91 60%, #061d45 100%);
            color: var(--text-light);
            padding: 70px 0 50px;
            position: relative;
            overflow: hidden;
            isolation: isolate;
        }

        .hero-bg-shapes { position: absolute; inset: 0; z-index: 0; pointer-events: none; }

        .hero-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.08;
        }

        .hero-shape-1 {
            width: 400px; height: 400px; background: white;
            top: -10%; right: -5%;
            animation: floatShape 12s ease-in-out infinite;
        }

        .hero-shape-2 {
            width: 250px; height: 250px; background: var(--secondary);
            bottom: -10%; left: -5%;
            animation: floatShape 15s ease-in-out infinite reverse;
        }

        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -25px) scale(1.08); }
            66% { transform: translate(-20px, 20px) scale(0.94); }
        }

        .hero-grid {
            position: absolute; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.5;
        }

        .hero-content {
            position: relative; z-index: 2; text-align: center;
            max-width: 850px; margin: 0 auto;
        }

        .hero-title {
            color: var(--text-light); margin-bottom: 14px;
            animation: fadeInUp 0.8s ease-out 0.15s both;
        }

        .hero-title span {
            background: linear-gradient(135deg, #ffd700, #ffed80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-description {
            font-size: 1.15rem; margin-bottom: 12px; opacity: 0.85;
            animation: fadeInUp 0.8s ease-out 0.3s both; line-height: 1.6;
        }

        /* MAIN CONTENT */
        .main-content { padding: 50px 0; }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--background);
            border-radius: var(--border-radius);
            padding: 24px 16px;
            text-align: center;
            transition: var(--transition);
            border: 1px solid transparent;
            box-shadow: var(--shadow);
        }

        .stat-card:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 4px;
        }

        .stat-number.total { color: var(--primary); }
        .stat-number.active { color: #06d6a0; }
        .stat-number.done { color: #8338ec; }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* CARD */
        .card {
            background: var(--background);
            border-radius: var(--border-radius);
            padding: 28px;
            transition: var(--transition);
            border: 1px solid transparent;
            box-shadow: var(--shadow);
            margin-bottom: 28px;
        }

        .card:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow-lg);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .card-header i {
            font-size: 1.2rem;
            color: var(--primary);
        }

        .card-header h3 {
            font-size: 1.1rem;
            margin: 0;
        }

        /* FORMS */
        .form-group { margin-bottom: 18px; }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius-sm);
            background: var(--background);
            color: var(--text-dark);
            transition: var(--transition);
            resize: vertical;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(11, 61, 145, 0.1);
        }

        .form-input::placeholder { color: var(--text-muted); }

        /* FILTER BUTTONS */
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .filter-group {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            background: var(--background);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-btn:hover {
            border-color: var(--primary-light);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* TASK LIST */
        .task-list { display: flex; flex-direction: column; gap: 12px; }

        .task-item {
            background: var(--background);
            border-radius: var(--border-radius-sm);
            padding: 20px;
            border: 1px solid #e2e8f0;
            transition: var(--transition);
            animation: fadeIn 0.3s ease-out;
        }

        .task-item:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }

        .task-item.completed {
            opacity: 0.7;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
        }

        .task-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .task-left {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            flex: 1;
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #d1d5db;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
            transition: var(--transition);
        }

        .task-checkbox:hover {
            border-color: #06d6a0;
        }

        .task-checkbox.checked {
            background: #06d6a0;
            border-color: #06d6a0;
            color: white;
        }

        .task-info { flex: 1; }

        .task-title {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .task-description {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .task-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .task-meta .synced {
            color: var(--primary);
        }

        .task-actions {
            display: flex;
            gap: 6px;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .action-btn.edit {
            background: #dbeafe;
            color: #1e40af;
        }
        .action-btn.edit:hover { background: #1e40af; color: white; }

        .action-btn.delete {
            background: #fee2e2;
            color: #dc2626;
        }
        .action-btn.delete:hover { background: #dc2626; color: white; }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state i {
            font-size: 3rem;
            color: #cbd5e1;
            margin-bottom: 16px;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* SYNC STATUS */
        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .sync-status.synced { background: #d1fae5; color: #065f46; }
        .sync-status.syncing { background: #dbeafe; color: #1e40af; }
        .sync-status.error { background: #fee2e2; color: #dc2626; }

        /* SPINNER */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid currentColor;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .hero { padding: 50px 0 40px; }
            .hero-title { font-size: 1.8rem; }
            .hero-description { font-size: 1rem; }
            .main-content { padding: 30px 0; }
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .filter-group { justify-content: center; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .hero-title { font-size: 1.5rem; }
            .task-row { flex-direction: column; }
            .task-actions { align-self: flex-end; }
        }
    </style>
</head>
<body>

<!-- HEADER (fetched dynamically) -->
<div id="header"></div>
<script>
fetch("super-header.html")
  .then(r => r.text())
  .then(data => {
    const headerDiv = document.getElementById("header");
    headerDiv.innerHTML = data;

    // Execute scripts from header
    headerDiv.querySelectorAll("script").forEach(oldScript => {
      const s = document.createElement("script");
      s.textContent = oldScript.textContent;
      document.head.appendChild(s);
    });
  });
</script>

<!-- ========== HERO ========== -->
<section class="hero" id="hero">
  <div class="hero-bg-shapes">
    <div class="hero-shape hero-shape-1"></div>
    <div class="hero-shape hero-shape-2"></div>
  </div>
  <div class="hero-grid"></div>
  <div class="container hero-content">
    <h1 class="hero-title"><span>Task</span> Manager</h1>
    <p class="hero-description">Organize projects, track progress, and stay productive. Tasks sync automatically to the cloud and persist locally.</p>
  </div>
</section>

<!-- ========== MAIN CONTENT ========== -->
<div class="main-content">
    <div class="container">

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number total" id="total-count">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-number active" id="active-count">0</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-card">
                <div class="stat-number done" id="done-count">0</div>
                <div class="stat-label">Completed</div>
            </div>
        </div>

        <!-- Sync Status -->
        <div style="text-align:center;margin-bottom:24px;">
            <span class="sync-status" id="sync-badge">
                <span class="spinner"></span> Initializing...
            </span>
        </div>

        <!-- Add Task Form -->
        <div class="card">
            <div class="card-header">
                <i class="fas fa-plus-circle" style="color:#06d6a0;"></i>
                <h3 id="form-title">Add New Task</h3>
            </div>
            <form id="task-form">
                <div class="form-group">
                    <label class="form-label">Task Title *</label>
                    <input type="text" id="task-title" placeholder="What needs to be done?" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea id="task-description" placeholder="Add some details..." class="form-input" rows="3"></textarea>
                </div>
                <div style="display:flex;gap:10px;">
                    <button type="submit" class="btn btn-primary" style="flex:1;" id="submit-btn">
                        <i class="fas fa-plus"></i> Add Task
                    </button>
                    <button type="button" class="btn btn-sm" id="cancel-edit-btn" style="display:none;background:#e2e8f0;color:var(--text-dark);border-radius:50px;">
                        Cancel
                    </button>
                </div>
            </form>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
            <button class="btn btn-danger btn-sm" id="clear-completed-btn" style="display:none;">
                <i class="fas fa-trash"></i> Clear Completed
            </button>
        </div>

        <!-- Task List -->
        <div id="task-list-container">
            <div class="card">
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>No tasks yet. Add your first task above!</p>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- FOOTER (fetched dynamically) -->
<div id="footer"></div>
<script>
fetch("super-footer.html")
.then(response => response.text())
.then(data => {
    document.getElementById("footer").innerHTML = data;
});
</script>

<!-- Smooth scrolling -->
<script>
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function (e) {
    const targetId = this.getAttribute('href');
    if (targetId === '#') return;
    const target = document.querySelector(targetId);
    if (target) {
      e.preventDefault();
      window.scrollTo({ top: target.offsetTop - 80, behavior: 'smooth' });
    }
  });
});
</script>

<script>
// Firebase Configuration
const firebaseConfig = {
    apiKey: "AIzaSyBcuCuqYrySz26d7CoQXZllePzMq3LEyWE",
    authDomain: "tkmachines-945b9.firebaseapp.com",
    projectId: "tkmachines-945b9",
    storageBucket: "tkmachines-945b9.firebasestorage.app",
    messagingSenderId: "137087394703",
    appId: "1:137087394703:web:81c3383fd6ee961ef3e1fa",
    measurementId: "G-Y8GH34Q2FN"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// Auth guard
auth.onAuthStateChanged(function(user) {
    if (!user) {
        window.location.href = 'index.html';
        return;
    }
    // User is authenticated, init app
    initApp(user);
});

function initApp(user) {
    const taskTitle = document.getElementById('task-title');
    const taskDescription = document.getElementById('task-description');
    const taskForm = document.getElementById('task-form');
    const submitBtn = document.getElementById('submit-btn');
    const cancelEditBtn = document.getElementById('cancel-edit-btn');
    const formTitle = document.getElementById('form-title');
    const taskListContainer = document.getElementById('task-list-container');
    const clearCompletedBtn = document.getElementById('clear-completed-btn');
    const syncBadge = document.getElementById('sync-badge');
    const totalCount = document.getElementById('total-count');
    const activeCount = document.getElementById('active-count');
    const doneCount = document.getElementById('done-count');

    let tasks = [];
    let editingId = null;
    let currentFilter = 'all';
    let isLoading = false;

    // Real-time Firestore listener
    const unsubscribe = db.collection('tasks')
        .where('userId', '==', user.uid)
        .orderBy('createdAt', 'desc')
        .onSnapshot(function(snapshot) {
            tasks = [];
            snapshot.forEach(function(doc) {
                const data = doc.data();
                tasks.push({
                    id: doc.id,
                    title: data.title,
                    description: data.description || '',
                    completed: data.completed || false,
                    createdAt: data.createdAt ? data.createdAt.toDate() : new Date()
                });
            });
            updateSyncStatus('synced');
            renderAll();
        }, function(error) {
            console.error('Firestore error:', error);
            updateSyncStatus('error');
            // Fallback to localStorage
            const saved = localStorage.getItem('tasks');
            if (saved) {
                tasks = JSON.parse(saved);
                renderAll();
            }
        });

    // Form submission
    taskForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const title = taskTitle.value.trim();
        if (!title || isLoading) return;

        isLoading = true;
        updateSyncStatus('syncing');

        try {
            if (editingId) {
                await db.collection('tasks').doc(editingId).update({
                    title: title,
                    description: taskDescription.value.trim()
                });
                editingId = null;
                submitBtn.innerHTML = '<i class="fas fa-plus"></i> Add Task';
                formTitle.textContent = 'Add New Task';
                cancelEditBtn.style.display = 'none';
            } else {
                await db.collection('tasks').add({
                    title: title,
                    description: taskDescription.value.trim(),
                    completed: false,
                    userId: user.uid,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            taskForm.reset();
        } catch (error) {
            console.error('Error saving task:', error);
            updateSyncStatus('error');
        } finally {
            isLoading = false;
        }
    });

    // Cancel edit
    cancelEditBtn.addEventListener('click', function() {
        editingId = null;
        taskForm.reset();
        submitBtn.innerHTML = '<i class="fas fa-plus"></i> Add Task';
        formTitle.textContent = 'Add New Task';
        cancelEditBtn.style.display = 'none';
    });

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.getAttribute('data-filter');
            renderTaskList();
        });
    });

    // Clear completed
    clearCompletedBtn.addEventListener('click', async function() {
        const completedTasks = tasks.filter(t => t.completed);
        if (completedTasks.length === 0) return;

        isLoading = true;
        updateSyncStatus('syncing');

        try {
            const batch = db.batch();
            completedTasks.forEach(function(task) {
                batch.delete(db.collection('tasks').doc(task.id));
            });
            await batch.commit();
        } catch (error) {
            console.error('Error clearing tasks:', error);
            updateSyncStatus('error');
        } finally {
            isLoading = false;
        }
    });

    // Toggle task completion
    window.toggleTask = async function(id) {
        const task = tasks.find(t => t.id === id);
        if (!task) return;

        try {
            await db.collection('tasks').doc(id).update({
                completed: !task.completed
            });
        } catch (error) {
            console.error('Error toggling task:', error);
            updateSyncStatus('error');
        }
    };

    // Delete task
    window.deleteTask = async function(id) {
        try {
            await db.collection('tasks').doc(id).delete();
        } catch (error) {
            console.error('Error deleting task:', error);
            updateSyncStatus('error');
        }
    };

    // Edit task
    window.editTask = function(id) {
        const task = tasks.find(t => t.id === id);
        if (!task) return;

        editingId = id;
        taskTitle.value = task.title;
        taskDescription.value = task.description || '';
        submitBtn.innerHTML = '<i class="fas fa-save"></i> Update Task';
        formTitle.textContent = 'Edit Task';
        cancelEditBtn.style.display = 'inline-flex';
        taskTitle.focus();
        window.scrollTo({ top: document.getElementById('task-form').offsetTop - 100, behavior: 'smooth' });
    };

    function updateSyncStatus(status) {
        syncBadge.className = 'sync-status ' + status;
        if (status === 'synced') {
            syncBadge.innerHTML = '<i class="fas fa-cloud"></i> Synced with cloud';
        } else if (status === 'syncing') {
            syncBadge.innerHTML = '<span class="spinner"></span> Syncing...';
        } else if (status === 'error') {
            syncBadge.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Sync error - using local storage';
        }
    }

    function renderAll() {
        // Backup to localStorage
        localStorage.setItem('tasks', JSON.stringify(tasks));

        // Update stats
        const completed = tasks.filter(t => t.completed).length;
        const active = tasks.length - completed;
        totalCount.textContent = tasks.length;
        activeCount.textContent = active;
        doneCount.textContent = completed;

        // Show/hide clear button
        clearCompletedBtn.style.display = completed > 0 ? 'inline-flex' : 'none';

        renderTaskList();
    }

    function renderTaskList() {
        const filtered = tasks.filter(function(task) {
            if (currentFilter === 'active') return !task.completed;
            if (currentFilter === 'completed') return task.completed;
            return true;
        });

        if (filtered.length === 0) {
            const messages = {
                'all': 'No tasks yet. Add your first task above!',
                'active': 'No active tasks. Time to add some! 🎯',
                'completed': 'No completed tasks yet. Keep going! 💪'
            };
            taskListContainer.innerHTML = `
                <div class="card">
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>${messages[currentFilter] || messages['all']}</p>
                    </div>
                </div>`;
            return;
        }

        taskListContainer.innerHTML = '<div class="task-list">' + filtered.map(function(task) {
            const dateStr = task.createdAt ? task.createdAt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
            return `
                <div class="task-item ${task.completed ? 'completed' : ''}">
                    <div class="task-row">
                        <div class="task-left">
                            <button class="task-checkbox ${task.completed ? 'checked' : ''}" onclick="toggleTask('${task.id}')">
                                ${task.completed ? '<i class="fas fa-check" style="font-size:0.7rem;"></i>' : ''}
                            </button>
                            <div class="task-info">
                                <div class="task-title">${escapeHtml(task.title)}</div>
                                ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
                                <div class="task-meta">
                                    <span><i class="fas fa-calendar" style="margin-right:4px;"></i>${dateStr}</span>
                                    ${task.completed ? '<span style="color:#06d6a0;"><i class="fas fa-check-circle" style="margin-right:4px;"></i>Completed</span>' : ''}
                                </div>
                            </div>
                        </div>
                        <div class="task-actions">
                            <button class="action-btn edit" onclick="editTask('${task.id}')" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="action-btn delete" onclick="deleteTask('${task.id}')" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
        }).join('') + '</div>';
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
}
</script>

</body>
</html>
