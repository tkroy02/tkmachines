<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager with Firebase 12.6</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Firebase 12.6 SDK -->
    <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-analytics.js"></script>
    
    <style>
        .task-completed {
            text-decoration: line-through;
            opacity: 0.7;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function TaskManager() {
            const [tasks, setTasks] = useState([]);
            const [title, setTitle] = useState('');
            const [description, setDescription] = useState('');
            const [filter, setFilter] = useState('all');
            const [editingId, setEditingId] = useState(null);
            const [editTitle, setEditTitle] = useState('');
            const [editDescription, setEditDescription] = useState('');
            const [firebaseInitialized, setFirebaseInitialized] = useState(false);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [dbRef, setDbRef] = useState(null);

            // Initialize Firebase
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        // Wait for Firebase to load
                        let attempts = 0;
                        while (!window.firebase && attempts < 50) {
                            await new Promise(resolve => setTimeout(resolve, 100));
                            attempts++;
                        }

                        if (!window.firebase) {
                            throw new Error("Firebase SDK failed to load");
                        }

                        const firebaseConfig = {
                            apiKey: "AIzaSyBcuCuqYrySz26d7CoQXZllePzMq3LEyWE",
                            authDomain: "tkmachines-945b9.firebaseapp.com",
                            projectId: "tkmachines-945b9",
                            storageBucket: "tkmachines-945b9.firebasestorage.app",
                            messagingSenderId: "137087394703",
                            appId: "1:137087394703:web:81c3383fd6ee961ef3e1fa",
                            measurementId: "G_Y8GH34Q2FN"
                        };

                        // Initialize Firebase
                        const app = window.firebase.initializeApp(firebaseConfig);
                        window.firebase.analytics(app);
                        setDbRef(window.firebase.firestore());
                        setFirebaseInitialized(true);
                        console.log("Firebase 12.6 initialized successfully");
                    } catch (error) {
                        console.error("Firebase initialization error:", error);
                        setError("Firebase failed to initialize. Working offline.");
                    } finally {
                        setLoading(false);
                    }
                };

                initFirebase();
            }, []);

            // Load tasks from Firebase
            useEffect(() => {
                if (!firebaseInitialized || !dbRef) return;

                const unsubscribe = dbRef?.collection("tasks")
                    .orderBy("createdAt", "desc")
                    .onSnapshot(
                        (snapshot) => {
                            const tasksArray = [];
                            snapshot.forEach((doc) => {
                                const data = doc.data();
                                tasksArray.push({ 
                                    id: doc.id, 
                                    ...data,
                                    createdAt: data.createdAt?.toDate ? data.createdAt.toDate() : new Date()
                                });
                            });
                            setTasks(tasksArray);
                        },
                        (error) => {
                            console.error("Error fetching tasks:", error);
                            setError("Failed to load tasks from Firebase");
                        }
                    );

                return () => unsubscribe();
            }, [firebaseInitialized, dbRef]);

            const addTask = async (e) => {
                e.preventDefault();
                if (!title.trim()) return;

                const newTask = {
                    title: title.trim(),
                    description: description.trim(),
                    completed: false,
                    createdAt: new Date()
                };

                try {
                    if (firebaseInitialized && dbRef) {
                        await dbRef.collection("tasks").add(newTask);
                    } else {
                        // Local fallback
                        setTasks([{ ...newTask, id: Date.now().toString() }, ...tasks]);
                    }
                    setTitle('');
                    setDescription('');
                } catch (error) {
                    console.error("Error adding task:", error);
                    setError("Failed to add task");
                }
            };

            const deleteTask = async (id) => {
                try {
                    if (firebaseInitialized && dbRef) {
                        await dbRef.collection("tasks").doc(id).delete();
                    } else {
                        setTasks(tasks.filter(task => task.id !== id));
                    }
                } catch (error) {
                    console.error("Error deleting task:", error);
                    setError("Failed to delete task");
                }
            };

            const toggleComplete = async (id) => {
                const taskToUpdate = tasks.find(task => task.id === id);
                if (!taskToUpdate) return;

                try {
                    if (firebaseInitialized && dbRef) {
                        await dbRef.collection("tasks").doc(id).update({
                            completed: !taskToUpdate.completed
                        });
                    } else {
                        setTasks(tasks.map(task =>
                            task.id === id ? { ...task, completed: !task.completed } : task
                        ));
                    }
                } catch (error) {
                    console.error("Error updating task:", error);
                    setError("Failed to update task");
                }
            };

            const startEditing = (task) => {
                setEditingId(task.id);
                setEditTitle(task.title);
                setEditDescription(task.description);
            };

            const cancelEditing = () => {
                setEditingId(null);
                setEditTitle('');
                setEditDescription('');
            };

            const saveEdit = async () => {
                if (!editTitle.trim()) return;

                try {
                    if (firebaseInitialized && dbRef) {
                        await dbRef.collection("tasks").doc(editingId).update({
                            title: editTitle.trim(),
                            description: editDescription.trim()
                        });
                    } else {
                        setTasks(tasks.map(task =>
                            task.id === editingId
                                ? { ...task, title: editTitle.trim(), description: editDescription.trim() }
                                : task
                        ));
                    }
                    cancelEditing();
                } catch (error) {
                    console.error("Error updating task:", error);
                    setError("Failed to save changes");
                }
            };

            const clearCompleted = async () => {
                const completedTasks = tasks.filter(task => task.completed);
                
                try {
                    if (firebaseInitialized && dbRef) {
                        const batch = dbRef.batch();
                        completedTasks.forEach(task => {
                            const taskRef = dbRef.collection("tasks").doc(task.id);
                            batch.delete(taskRef);
                        });
                        await batch.commit();
                    } else {
                        setTasks(tasks.filter(task => !task.completed));
                    }
                } catch (error) {
                    console.error("Error clearing completed tasks:", error);
                    setError("Failed to clear completed tasks");
                }
            };

            const filteredTasks = tasks.filter(task => {
                if (filter === 'active') return !task.completed;
                if (filter === 'completed') return task.completed;
                return true;
            });

            const completedCount = tasks.filter(task => task.completed).length;
            const activeCount = tasks.length - completedCount;

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-purple-100 py-8 px-4">
                    <div className="max-w-2xl mx-auto">
                        {/* Header */}
                        <div className="text-center mb-8">
                            <h1 className="text-4xl font-bold text-gray-800 mb-2">
                                <i className="fas fa-tasks text-blue-500 mr-3"></i>
                                Task Manager
                            </h1>
                            <p className="text-gray-600">
                                {firebaseInitialized 
                                    ? "Powered by Firebase 12.6 ☁️" 
                                    : loading
                                    ? "Initializing Firebase..."
                                    : "Working offline"}
                            </p>
                        </div>

                        {/* Error Message */}
                        {error && (
                            <div className="bg-yellow-100 border border-yellow-400 text-yellow-800 px-4 py-3 rounded-lg mb-4">
                                <i className="fas fa-exclamation-triangle mr-2"></i>
                                {error}
                            </div>
                        )}

                        {/* Stats Cards */}
                        <div className="grid grid-cols-3 gap-4 mb-6">
                            <div className="bg-white rounded-lg p-4 shadow text-center">
                                <div className="text-2xl font-bold text-blue-600">{tasks.length}</div>
                                <div className="text-sm text-gray-600">Total</div>
                            </div>
                            <div className="bg-white rounded-lg p-4 shadow text-center">
                                <div className="text-2xl font-bold text-green-600">{activeCount}</div>
                                <div className="text-sm text-gray-600">Active</div>
                            </div>
                            <div className="bg-white rounded-lg p-4 shadow text-center">
                                <div className="text-2xl font-bold text-purple-600">{completedCount}</div>
                                <div className="text-sm text-gray-600">Done</div>
                            </div>
                        </div>

                        {/* Add Task Form */}
                        <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                            <h2 className="text-xl font-semibold mb-4 text-gray-800">
                                <i className="fas fa-plus-circle text-green-500 mr-2"></i>
                                {editingId ? 'Edit Task' : 'Add New Task'}
                            </h2>
                            <form onSubmit={editingId ? saveEdit : addTask} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">
                                        Task Title *
                                    </label>
                                    <input
                                        type="text"
                                        value={editingId ? editTitle : title}
                                        onChange={(e) => editingId ? setEditTitle(e.target.value) : setTitle(e.target.value)}
                                        placeholder="What needs to be done?"
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">
                                        Description
                                    </label>
                                    <textarea
                                        value={editingId ? editDescription : description}
                                        onChange={(e) => editingId ? setEditDescription(e.target.value) : setDescription(e.target.value)}
                                        placeholder="Add some details..."
                                        rows="3"
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    />
                                </div>
                                <div className="flex gap-2">
                                    {editingId ? (
                                        <>
                                            <button
                                                type="submit"
                                                className="flex-1 bg-green-500 text-white py-2 px-4 rounded-lg hover:bg-green-600 transition duration-200"
                                            >
                                                <i className="fas fa-save mr-2"></i>Save Changes
                                            </button>
                                            <button
                                                type="button"
                                                onClick={cancelEditing}
                                                className="bg-gray-500 text-white py-2 px-4 rounded-lg hover:bg-gray-600 transition duration-200"
                                            >
                                                Cancel
                                            </button>
                                        </>
                                    ) : (
                                        <button
                                            type="submit"
                                            className="w-full bg-blue-500 text-white py-3 px-4 rounded-lg hover:bg-blue-600 transition duration-200 font-semibold"
                                        >
                                            <i className="fas fa-plus mr-2"></i>Add Task
                                        </button>
                                    )}
                                </div>
                            </form>
                        </div>

                        {/* Filters */}
                        <div className="flex justify-between items-center mb-4">
                            <div className="flex gap-2">
                                {['all', 'active', 'completed'].map((f) => (
                                    <button
                                        key={f}
                                        onClick={() => setFilter(f)}
                                        className={`px-4 py-2 rounded-lg capitalize ${
                                            filter === f
                                                ? 'bg-blue-500 text-white'
                                                : 'bg-white text-gray-700 hover:bg-gray-100'
                                        }`}
                                    >
                                        {f}
                                    </button>
                                ))}
                            </div>
                            {completedCount > 0 && (
                                <button
                                    onClick={clearCompleted}
                                    className="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition duration-200"
                                >
                                    <i className="fas fa-trash mr-2"></i>Clear Completed
                                </button>
                            )}
                        </div>

                        {/* Task List */}
                        <div className="space-y-3">
                            {filteredTasks.length === 0 ? (
                                <div className="bg-white rounded-xl shadow p-8 text-center">
                                    <i className="fas fa-inbox text-4xl text-gray-300 mb-4"></i>
                                    <p className="text-gray-500 text-lg">
                                        {filter === 'completed' 
                                            ? "No completed tasks yet - keep going! 💪"
                                            : filter === 'active'
                                            ? "No active tasks - time to add some! 🎯"
                                            : "No tasks yet. Add your first task to get started! 🚀"
                                        }
                                    </p>
                                </div>
                            ) : (
                                filteredTasks.map((task) => (
                                    <div key={task.id} className="bg-white rounded-xl shadow hover:shadow-md transition duration-200 fade-in">
                                        <div className="p-4">
                                            {editingId === task.id ? (
                                                <div className="space-y-3">
                                                    <input
                                                        type="text"
                                                        value={editTitle}
                                                        onChange={(e) => setEditTitle(e.target.value)}
                                                        className="w-full px-3 py-2 border border-gray-300 rounded-lg font-semibold"
                                                    />
                                                    <textarea
                                                        value={editDescription}
                                                        onChange={(e) => setEditDescription(e.target.value)}
                                                        className="w-full px-3 py-2 border border-gray-300 rounded-lg"
                                                        rows="2"
                                                    />
                                                    <div className="flex gap-2">
                                                        <button
                                                            onClick={saveEdit}
                                                            className="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600"
                                                        >
                                                            Save
                                                        </button>
                                                        <button
                                                            onClick={cancelEditing}
                                                            className="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600"
                                                        >
                                                            Cancel
                                                        </button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="flex items-start justify-between">
                                                    <div className="flex items-start space-x-3 flex-1">
                                                        <button
                                                            onClick={() => toggleComplete(task.id)}
                                                            className={`mt-1 w-5 h-5 rounded-full border-2 flex items-center justify-center ${
                                                                task.completed
                                                                    ? 'bg-green-500 border-green-500 text-white'
                                                                    : 'border-gray-300 hover:border-green-400'
                                                            }`}
                                                        >
                                                            {task.completed && <i className="fas fa-check text-xs"></i>}
                                                        </button>
                                                        <div className={`flex-1 ${task.completed ? 'task-completed' : ''}`}>
                                                            <h3 className="font-semibold text-gray-800 text-lg">
                                                                {task.title}
                                                            </h3>
                                                            {task.description && (
                                                                <p className="text-gray-600 mt-1">{task.description}</p>
                                                            )}
                                                            <div className="flex items-center gap-4 mt-2 text-sm text-gray-500">
                                                                <span>
                                                                    <i className="fas fa-calendar mr-1"></i>
                                                                    {task.createdAt ? 
                                                                        new Date(task.createdAt).toLocaleDateString() 
                                                                        : 'Recently'
                                                                    }
                                                                </span>
                                                                {task.completed && (
                                                                    <span className="text-green-500">
                                                                        <i className="fas fa-check-circle mr-1"></i>
                                                                        Completed
                                                                    </span>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-1 ml-2">
                                                        <button
                                                            onClick={() => startEditing(task)}
                                                            className="p-2 text-blue-500 hover:bg-blue-50 rounded-lg transition duration-200"
                                                            title="Edit task"
                                                        >
                                                            <i className="fas fa-edit"></i>
                                                        </button>
                                                        <button
                                                            onClick={() => deleteTask(task.id)}
                                                            className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition duration-200"
                                                            title="Delete task"
                                                        >
                                                            <i className="fas fa-trash"></i>
                                                        </button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>

                        {/* Footer */}
                        <div className="text-center mt-8 text-gray-500 text-sm">
                            <p>Powered by Firebase 12.6 with real-time sync ☁️</p>
                            <p>Your tasks are saved to the cloud and synchronized across devices.</p>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<TaskManager />, document.getElementById('root'));
    </script>
</body>
</html>
