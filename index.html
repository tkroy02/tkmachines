<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TK Dashboard - Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  
  <style>
    /* Reset and base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Roboto', sans-serif;
    }

    :root {
      --primary: #3a86ff;
      --primary-dark: #2667cc;
      --secondary: #8338ec;
      --success: #06d6a0;
      --warning: #ffd166;
      --danger: #ef476f;
      --dark: #1a1a2e;
      --light: #f8f9fa;
      --gray: #6c757d;
      --border-radius: 12px;
      --box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      --transition: all 0.3s ease;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
      color: var(--dark);
      line-height: 1.6;
    }

    /* Login Page Styles */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: white;
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      padding: 40px;
      width: 100%;
      max-width: 450px;
      text-align: center;
    }

    .login-logo {
      margin-bottom: 30px;
    }

    .login-logo i {
      font-size: 3.5rem;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 15px;
    }

    .login-logo h1 {
      font-size: 2rem;
      color: var(--dark);
      margin-bottom: 5px;
    }

    .login-logo p {
      color: var(--gray);
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--dark);
    }

    .form-control {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      transition: var(--transition);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(58, 134, 255, 0.2);
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 25px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      width: 100%;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(58, 134, 255, 0.3);
    }

    .btn-secondary {
      background: linear-gradient(135deg, var(--gray) 0%, #5a6268 100%);
    }

    .btn-secondary:hover {
      box-shadow: 0 5px 15px rgba(108, 117, 125, 0.3);
    }

    .error-message {
      background-color: rgba(239, 71, 111, 0.1);
      color: var(--danger);
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .success-message {
      background-color: rgba(6, 214, 160, 0.1);
      color: var(--success);
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .login-options {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: var(--gray);
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ddd;
    }

    .divider span {
      padding: 0 15px;
    }

    /* Loading Spinner */
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .login-card {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Login Page -->
  <div id="login-page" class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <i class="fas fa-tachometer-alt"></i>
        <h1>TK Dashboard</h1>
        <p>Admin Login Required</p>
      </div>
      
      <div id="error-message" class="error-message">
        Invalid username or password. Please try again.
      </div>
      
      <div id="success-message" class="success-message">
        Password reset email sent! Check your inbox.
      </div>
      
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="Enter admin email" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter admin password" required>
        </div>
        
        <button type="submit" class="btn" id="login-btn">
          <span class="spinner" id="login-spinner" style="display: none;"></span>
          Login
        </button>
      </form>
      
      <div class="login-options">
        <button class="btn btn-secondary" id="reset-password-btn">
          Reset Password
        </button>
      </div>
    </div>
  </div>

  <script>
    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBcuCuqYrySz26d7CoQXZllePzMq3LEyWE",
      authDomain: "tkmachines-945b9.firebaseapp.com",
      projectId: "tkmachines-945b9",
      storageBucket: "tkmachines-945b9.firebasestorage.app",
      messagingSenderId: "137087394703",
      appId: "1:137087394703:web:81c3383fd6ee961ef3e1fa",
      measurementId: "G-Y8GH34Q2FN"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // DOM Elements
    const loginPage = document.getElementById('login-page');
    const loginForm = document.getElementById('login-form');
    const errorMessage = document.getElementById('error-message');
    const successMessage = document.getElementById('success-message');
    const resetPasswordBtn = document.getElementById('reset-password-btn');
    const loginBtn = document.getElementById('login-btn');
    const loginSpinner = document.getElementById('login-spinner');

    // Handle login form submission
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // Show loading state
      loginSpinner.style.display = 'inline-block';
      loginBtn.disabled = true;
      
      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          // Login successful
          hideMessages();
          const user = userCredential.user;
          // Redirect to dashboard page
          window.location.href = "dashboard.html";
        })
        .catch((error) => {
          // Login failed
          loginSpinner.style.display = 'none';
          loginBtn.disabled = false;
          
          let errorMsg = "Login failed. Please try again.";
          if (error.code === 'auth/user-not-found') {
            errorMsg = "No account found with this email.";
          } else if (error.code === 'auth/wrong-password') {
            errorMsg = "Incorrect password.";
          } else if (error.code === 'auth/invalid-email') {
            errorMsg = "Invalid email address.";
          }
          
          showError(errorMsg);
        });
    });

    // Handle password reset
    resetPasswordBtn.addEventListener('click', function() {
      const email = document.getElementById('email').value;
      
      if (!email) {
        showError("Please enter your email address to reset your password.");
        return;
      }
      
      auth.sendPasswordResetEmail(email)
        .then(() => {
          hideMessages();
          showSuccess("Password reset email sent! Check your inbox.");
        })
        .catch((error) => {
          let errorMsg = "Failed to send reset email. Please try again.";
          if (error.code === 'auth/user-not-found') {
            errorMsg = "No account found with this email.";
          } else if (error.code === 'auth/invalid-email') {
            errorMsg = "Invalid email address.";
          }
          
          showError(errorMsg);
        });
    });

    // Utility functions for messages
    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';
      successMessage.style.display = 'none';
    }

    function showSuccess(message) {
      successMessage.textContent = message;
      successMessage.style.display = 'block';
      errorMessage.style.display = 'none';
    }

    function hideMessages() {
      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';
    }
  </script>
</body>
</html>
