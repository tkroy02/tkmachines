        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);

            padding: 25px 40px;

            position: relative;
            overflow: hidden;
        }

        .header-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;

        .logout-btn {
            background: rgba(255,255,255,0.2);

            border: none;
            border-radius: 8px;
            padding: 8px 15px;
            cursor: pointer;
            transition: var(--transition);

            align-items: center;
            gap: 8px;

        .logo {
            display: flex;

        .logo i {
            font-size: 2.5rem;

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-effect { 
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .chart-container { position: relative; height: 300px; }
        .progress-ring {
            transform: rotate(-90deg);
        }
        .progress-ring-circle {
            transition: stroke-dashoffset 0.5s ease;
            transform-origin: 50% 50%;
        }
        .hover-lift { transition: all 0.3s ease; }
        .hover-lift:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3a86ff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function AccountingApp() {
            // State for transactions
            const [transactions, setTransactions] = useState([]);
            const [description, setDescription] = useState('');
            const [amount, setAmount] = useState('');
            const [type, setType] = useState('revenue');
            const [category, setCategory] = useState('');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [currentUser, setCurrentUser] = useState(null);
            const [firebaseReady, setFirebaseReady] = useState(false);
            const [authChecked, setAuthChecked] = useState(false);
            const [chartsRendering, setChartsRendering] = useState(false);
            
            // State for filtering and views
            const [filter, setFilter] = useState('all');
            const [timeRange, setTimeRange] = useState('all');
            const [editingId, setEditingId] = useState(null);
            const [editData, setEditData] = useState({});
            const [activeTab, setActiveTab] = useState('overview');

            // Chart references
            const financialChartRef = useRef(null);
            const categoryChartRef = useRef(null);
            const trendChartRef = useRef(null);
            const cashFlowChartRef = useRef(null);

            // Chart instances
            const [chartInstances, setChartInstances] = useState({
                financialChart: null,
                categoryChart: null,
                trendChart: null,
                cashFlowChart: null
            });

            // Categories
            const revenueCategories = ['Sales', 'Services', 'Investments', 'Other Income'];
            const expenseCategories = ['Supplies', 'Salaries', 'Rent', 'Utilities', 'Marketing', 'Travel', 'Equipment', 'Other Expenses'];

            // Initialize Firebase and check auth status
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        if (typeof firebase !== 'undefined' && firebase.apps.length > 0) {
                            setFirebaseReady(true);
                            console.log('✅ Firebase is ready');
                            
                            // Set up auth state listener
                            firebase.auth().onAuthStateChanged(async (user) => {
                                console.log('🔐 Auth state changed:', user ? user.email : 'No user');
                                setAuthChecked(true);
                                
                                if (user) {
                                    // User is logged in via your login system
                                    setCurrentUser(user);
                                    await loadTransactionsFromFirebase(user);
                                    
                                    // Update UI with user info
                                    updateUserInfo(user);
                                } else {
                                    // No user - redirect to login page
                                    console.log('🚫 No authenticated user - redirecting to login');
                                    setLoading(false);
                                    window.location.href = 'login.html';
                                }
                            });
                        } else {
                            console.log('🚫 Firebase not available');
                            setFirebaseReady(false);
                            setAuthChecked(true);
                            setLoading(false);
                        }
                    } catch (error) {
                        console.error('❌ Firebase init error:', error);
                        setFirebaseReady(false);
                        setAuthChecked(true);
                        setLoading(false);
                    }
                };

                initFirebase();
            }, []);

            // Update user info in the header
            const updateUserInfo = (user) => {
                try {
                    const adminNameElement = document.getElementById('admin-name');
                    const adminEmailElement = document.getElementById('admin-email');
                    
                    if (adminNameElement && adminEmailElement) {
                        adminNameElement.textContent = user.displayName || 'User';
                        adminEmailElement.textContent = user.email || 'Logged in';
                    }
                } catch (error) {
                    console.log('Could not update user info in header');
                }
            };

            // Load transactions from Firebase
            const loadTransactionsFromFirebase = async (user) => {
                try {
                    setLoading(true);
                    console.log('📥 Loading transactions for user:', user.uid);
                    
                    const db = firebase.firestore();
                    const snapshot = await db
                        .collection('transactions_account')
                        .where('userId', '==', user.uid)
                        .orderBy('createdAt', 'desc')
                        .get();
                    
                    const transactionsData = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    
                    console.log(`✅ Loaded ${transactionsData.length} transactions`);
                    setTransactions(transactionsData);
                } catch (error) {
                    console.error("❌ Error loading transactions:", error);
                    // Start with empty array if there's an error
                    setTransactions([]);
                } finally {
                    setLoading(false);
                }
            };

            // Save transaction to Firebase
            const saveTransactionToFirebase = async (transactionData) => {
                if (!firebaseReady || !currentUser) {
                    throw new Error('Firebase not ready or user not authenticated');
                }

                const db = firebase.firestore();
                const transactionWithUser = {
                    ...transactionData,
                    userId: currentUser.uid,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                console.log('💾 Saving transaction to Firebase:', transactionWithUser);
                
                const docRef = await db.collection('transactions_account').add(transactionWithUser);
                console.log('✅ Transaction saved with ID:', docRef.id);
                
                return docRef.id;
            };

            // Update transaction in Firebase
            const updateTransactionInFirebase = async (transactionId, updateData) => {
                if (!firebaseReady || !currentUser) {
                    throw new Error('Firebase not ready or user not authenticated');
                }

                const db = firebase.firestore();
                const updateWithTimestamp = {
                    ...updateData,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                console.log('✏️ Updating transaction:', transactionId, updateWithTimestamp);
                
                await db.collection('transactions_account').doc(transactionId).update(updateWithTimestamp);
                console.log('✅ Transaction updated:', transactionId);
            };

            // Delete transaction from Firebase
            const deleteTransactionFromFirebase = async (transactionId) => {
                if (!firebaseReady || !currentUser) {
                    throw new Error('Firebase not ready or user not authenticated');
                }

                const db = firebase.firestore();
                console.log('🗑️ Deleting transaction:', transactionId);
                
                await db.collection('transactions_account').doc(transactionId).delete();
                console.log('✅ Transaction deleted:', transactionId);
            };

            // Calculations
            const calculateTotals = () => {
                const filtered = filterTransactions();
                const revenue = filtered
                    .filter(t => t.type === 'revenue')
                    .reduce((sum, t) => sum + parseFloat(t.amount), 0);
                
                const expenses = filtered
                    .filter(t => t.type === 'expense')
                    .reduce((sum, t) => sum + parseFloat(t.amount), 0);
                
                const profit = revenue - expenses;
                const profitMargin = revenue > 0 ? (profit / revenue) * 100 : 0;

                return { revenue, expenses, profit, profitMargin };
            };

            const filterTransactions = () => {
                let filtered = transactions;
                
                if (filter !== 'all') {
                    filtered = filtered.filter(t => t.type === filter);
                }
                
                const now = new Date();
                if (timeRange === 'month') {
                    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                    filtered = filtered.filter(t => new Date(t.date) >= startOfMonth);
                } else if (timeRange === 'week') {
                    const startOfWeek = new Date(now);
                    startOfWeek.setDate(now.getDate() - now.getDay());
                    filtered = filtered.filter(t => new Date(t.date) >= startOfWeek);
                }
                
                return filtered;
            };

            // Add transaction with Firebase integration
            const addTransaction = async (e) => {
                e.preventDefault();
                if (!description.trim() || !amount || !category) return;

                try {
                    setSaving(true);
                    const newTransaction = {
                        description: description.trim(),
                        amount: parseFloat(amount),
                        type,
                        category,
                        date
                    };

                    let transactionId;

                    // Save to Firebase
                    if (firebaseReady && currentUser) {
                        try {
                            transactionId = await saveTransactionToFirebase(newTransaction);
                            console.log('✅ Successfully saved to Firebase');
                        } catch (firebaseError) {
                            console.error('❌ Firebase save failed:', firebaseError);
                            throw new Error('Failed to save to database');
                        }
                    } else {
                        throw new Error('Not authenticated');
                    }

                    // Update local state
                    const transactionWithId = {
                        id: transactionId,
                        ...newTransaction,
                        userId: currentUser.uid,
                        createdAt: new Date()
                    };

                    setTransactions([transactionWithId, ...transactions]);
                    resetForm();
                    
                } catch (error) {
                    console.error("❌ Error adding transaction:", error);
                    alert('Failed to save transaction. Please try again.');
                } finally {
                    setSaving(false);
                }
            };

            // Delete transaction
            const deleteTransaction = async (id) => {
                if (!confirm('Are you sure you want to delete this transaction?')) return;
                
                try {
                    // Delete from Firebase
                    if (firebaseReady && currentUser) {
                        await deleteTransactionFromFirebase(id);
                    }
                    
                    setTransactions(transactions.filter(t => t.id !== id));
                    console.log('✅ Transaction deleted');
                    
                } catch (error) {
                    console.error("❌ Error deleting transaction:", error);
                    // Still remove from local state even if Firebase fails
                    setTransactions(transactions.filter(t => t.id !== id));
                }
            };

            // Save edit
            const saveEdit = async () => {
                try {
                    setSaving(true);
                    
                    const updatedData = {
                        ...editData,
                        amount: parseFloat(editData.amount)
                    };

                    // Update in Firebase
                    if (firebaseReady && currentUser) {
                        await updateTransactionInFirebase(editingId, updatedData);
                    }
                    
                    // Update local state
                    setTransactions(transactions.map(t => 
                        t.id === editingId ? { ...t, ...updatedData } : t
                    ));
                    
                    cancelEditing();
                    console.log('✅ Transaction updated');
                    
                } catch (error) {
                    console.error("❌ Error updating transaction:", error);
                    alert('Failed to update transaction. Please try again.');
                } finally {
                    setSaving(false);
                }
            };

            // Keep existing helper functions
            const startEditing = (transaction) => {
                setEditingId(transaction.id);
                setEditData({ ...transaction });
            };

            const cancelEditing = () => {
                setEditingId(null);
                setEditData({});
            };

            const resetForm = () => {
                setDescription('');
                setAmount('');
                setCategory('');
                setDate(new Date().toISOString().split('T')[0]);
            };

            const formatCurrency = (value) => {
                return new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD'
                }).format(value);
            };

// FIXED: Render charts when activeTab changes or when switching to overview/analytics
useEffect(() => {
    if (transactions.length > 0 && !loading && currentUser) {
        const timer = setTimeout(() => {
            // Only render charts if we're on overview or analytics tab
            if (activeTab === 'overview' || activeTab === 'analytics') {
                console.log('Rendering charts for tab:', activeTab);
                renderAllCharts();
            }
        }, 100);
        
        return () => clearTimeout(timer);
    }
}, [transactions, filter, timeRange, loading, currentUser, activeTab]); // Added activeTab dependency

// NEW: Force re-render charts when switching to overview/analytics tabs
useEffect(() => {
    if ((activeTab === 'overview' || activeTab === 'analytics') && transactions.length > 0 && !loading) {
        console.log('Tab switched to:', activeTab, '- re-rendering charts');
        const timer = setTimeout(() => {
            renderAllCharts();
        }, 50);
        
        return () => clearTimeout(timer);
    }
}, [activeTab]); // This specifically watches for tab changes
            
            // FIXED: Chart rendering with proper cleanup and timing
            useEffect(() => {
                if (transactions.length > 0 && !loading && currentUser) {
                    const timer = setTimeout(() => {
                        console.log('Rendering charts...');
                        renderAllCharts();
                    }, 100);
                    
                    return () => clearTimeout(timer);
                }
            }, [transactions, filter, timeRange, loading, currentUser]);

            // Clean up charts on unmount
            useEffect(() => {
                return () => {
                    Object.values(chartInstances).forEach(chart => {
                        if (chart && typeof chart.destroy === 'function') {
                            chart.destroy();
                        }
                    });
                };
            }, []);

            const renderAllCharts = () => {
    if (typeof Chart === 'undefined') {
        console.log('Chart.js not loaded yet');
        return;
    }

    setChartsRendering(true);
    
    try {
        if (activeTab === 'overview') {
            renderFinancialChart();
            renderCategoryChart();
        } else if (activeTab === 'analytics') {
            renderTrendChart();
            renderCashFlowChart();
        }
    } catch (error) {
        console.error('Error rendering charts:', error);
    } finally {
        setChartsRendering(false);
    }
};

            const renderFinancialChart = () => {
                if (!financialChartRef.current) {
                    console.log('Financial chart canvas not ready');
                    return;
                }

                const ctx = financialChartRef.current.getContext('2d');
                if (!ctx) return;

                // Destroy previous chart
                if (chartInstances.financialChart) {
                    chartInstances.financialChart.destroy();
                }

                const { revenue, expenses, profit } = calculateTotals();
                
                const data = {
                    labels: ['Revenue', 'Expenses', 'Profit'],
                    datasets: [{
                        data: [revenue, expenses, profit],
                        backgroundColor: [
                            'rgba(16, 185, 129, 0.8)',
                            'rgba(239, 68, 68, 0.8)',
                            'rgba(59, 130, 246, 0.8)'
                        ],
                        borderColor: [
                            'rgb(16, 185, 129)',
                            'rgb(239, 68, 68)',
                            'rgb(59, 130, 246)'
                        ],
                        borderWidth: 2,
                        borderRadius: 8,
                        borderSkipped: false,
                    }]
                };
                
                const newChart = new Chart(ctx, {
                    type: 'bar',
                    data: data,
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return `${context.label}: ${formatCurrency(context.raw)}`;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) {
                                        return formatCurrency(value);
                                    }
                                }
                            }
                        }
                    }
                });

                setChartInstances(prev => ({ ...prev, financialChart: newChart }));
            };

            const renderCategoryChart = () => {
                if (!categoryChartRef.current) {
                    console.log('Category chart canvas not ready');
                    return;
                }

                const ctx = categoryChartRef.current.getContext('2d');
                if (!ctx) return;

                // Destroy previous chart
                if (chartInstances.categoryChart) {
                    chartInstances.categoryChart.destroy();
                }

                const breakdown = categoryBreakdown();
                const labels = Object.keys(breakdown);
                const data = Object.values(breakdown);
                
                const backgroundColors = labels.map((_, i) => {
                    const hue = (i * 137.5) % 360;
                    return `hsla(${hue}, 70%, 65%, 0.8)`;
                });
                
                const borderColors = labels.map((_, i) => {
                    const hue = (i * 137.5) % 360;
                    return `hsl(${hue}, 70%, 50%)`;
                });
                
                const newChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            backgroundColor: backgroundColors,
                            borderColor: borderColors,
                            borderWidth: 2,
                            hoverOffset: 15
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'right',
                                labels: {
                                    boxWidth: 12,
                                    padding: 15
                                }
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const value = context.raw;
                                        const total = data.reduce((a, b) => a + b, 0);
                                        const percentage = ((value / total) * 100).toFixed(1);
                                        return `${context.label}: ${formatCurrency(value)} (${percentage}%)`;
                                    }
                                }
                            }
                        }
                    }
                });

                setChartInstances(prev => ({ ...prev, categoryChart: newChart }));
            };

            const renderTrendChart = () => {
                if (!trendChartRef.current) {
                    console.log('Trend chart canvas not ready');
                    return;
                }

                const ctx = trendChartRef.current.getContext('2d');
                if (!ctx) return;

                // Destroy previous chart
                if (chartInstances.trendChart) {
                    chartInstances.trendChart.destroy();
                }

                const trendData = getMonthlyTrendData();
                
                const newChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: trendData.labels,
                        datasets: [
                            {
                                label: 'Revenue',
                                data: trendData.revenue,
                                borderColor: 'rgb(16, 185, 129)',
                                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                tension: 0.3,
                                fill: true
                            },
                            {
                                label: 'Expenses',
                                data: trendData.expenses,
                                borderColor: 'rgb(239, 68, 68)',
                                backgroundColor: 'rgba(239, 68, 68, 0.1)',
                                tension: 0.3,
                                fill: true
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return `${context.dataset.label}: ${formatCurrency(context.raw)}`;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) {
                                        return formatCurrency(value);
                                    }
                                }
                            }
                        }
                    }
                });

                setChartInstances(prev => ({ ...prev, trendChart: newChart }));
            };

            const renderCashFlowChart = () => {
                if (!cashFlowChartRef.current) {
                    console.log('Cash flow chart canvas not ready');
                    return;
                }

                const ctx = cashFlowChartRef.current.getContext('2d');
                if (!ctx) return;

                // Destroy previous chart
                if (chartInstances.cashFlowChart) {
                    chartInstances.cashFlowChart.destroy();
                }

                const cashFlow = getCashFlowData();
                
                const newChart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: ['Revenue', 'Expenses'],
                        datasets: [{
                            data: [cashFlow.revenue, cashFlow.expenses],
                            backgroundColor: [
                                'rgba(16, 185, 129, 0.8)',
                                'rgba(239, 68, 68, 0.8)'
                            ],
                            borderColor: [
                                'rgb(16, 185, 129)',
                                'rgb(239, 68, 68)'
                            ],
                            borderWidth: 2,
                            hoverOffset: 15

                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return `${context.label}: ${formatCurrency(context.raw)}`;
                                    }
                                }
                            }
                        }
                    }
                });

                setChartInstances(prev => ({ ...prev, cashFlowChart: newChart }));
            };

            const categoryBreakdown = () => {
                const breakdown = {};
                filteredTransactions.forEach(t => {
                    if (!breakdown[t.category]) breakdown[t.category] = 0;
                    breakdown[t.category] += t.amount;
                });
                return breakdown;
            };

            const getMonthlyTrendData = () => {
                const monthlyData = {};
                const now = new Date();
                const months = [];
                
                for (let i = 5; i >= 0; i--) {
                    const date = new Date(now.getFullYear(), now.getMonth() - i, 1);
                    const monthKey = date.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
                    months.push(monthKey);
                    monthlyData[monthKey] = { revenue: 0, expenses: 0 };
                }
                
                transactions.forEach(t => {
                    const date = new Date(t.date);
                    const monthKey = date.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
                    
                    if (monthlyData[monthKey]) {
                        if (t.type === 'revenue') {
                            monthlyData[monthKey].revenue += t.amount;
                        } else {
                            monthlyData[monthKey].expenses += t.amount;
                        }
                    }
                });
                
                return {
                    labels: months,
                    revenue: months.map(m => monthlyData[m].revenue),
                    expenses: months.map(m => monthlyData[m].expenses)
                };
            };

            const getCashFlowData = () => {
                const cashFlow = { revenue: 0, expenses: 0 };
                const now = new Date();
                const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                
                transactions
                    .filter(t => new Date(t.date) >= startOfMonth)
                    .forEach(t => {
                        if (t.type === 'revenue') {
                            cashFlow.revenue += t.amount;
                        } else {
                            cashFlow.expenses += t.amount;
                        }
                    });
                
                return cashFlow;

                const circumference = radius * 2 * Math.PI;

                return (
                    <svg width={size} height={size} className="progress-ring">
                        <circle
                            className="progress-ring-circle"
                            stroke={color}
                            strokeWidth={strokeWidth}
                            strokeDasharray={circumference}
                            strokeDashoffset={strokeDashoffset}
                            strokeLinecap="round"
                            fill="transparent"
                            r={radius}
                            cx={size / 2}
                            cy={size / 2}
                        />
                        <text 
                            x="50%" 
                            y="50%" 
                            textAnchor="middle" 
                            dy=".3em" 
                            fontSize="16"

                                                                <i className="fas fa-trash"></i>
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        <div className="text-center mt-8 text-gray-500 text-sm">
                            <p>Data is securely stored in Firebase Firestore ✅</p>
                        </div>
                    </div>
                </div>
            );
        }

        // Use React 18 createRoot
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AccountingApp />);
    </script>
</body>
</html>
